name: Deploy Supabase Edge Functions

# Deploys every function under supabase/functions/* to the shared Supabase
# project (kwdusucahpkfomjiyhie — shared with the Launchpad repo) whenever
# a function or config.toml changes on main, or on demand.
#
# One-time setup required: add a repo secret named SUPABASE_ACCESS_TOKEN
# (Settings -> Secrets and variables -> Actions -> New repository secret),
# generated from https://supabase.com/dashboard/account/tokens. This
# workflow only deploys function CODE — it does not set/rotate provider
# secrets (ANTHROPIC_API_KEY, GEMINI_API_KEY, GOOGLE_DOCUMENT_AI_KEY, etc.);
# those are set once via `supabase secrets set` and persist independently
# of code deploys.

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-supabase-functions.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-supabase-functions
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Typecheck edge functions (fail fast before deploying)
        run: |
          set -e
          for fn in supabase/functions/*/; do
            name=$(basename "$fn")
            if [ "$name" = "_shared" ]; then continue; fi
            echo "::group::deno check $name"
            deno check "$fn/index.ts"
            echo "::endgroup::"
          done

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all functions
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: kwdusucahpkfomjiyhie
